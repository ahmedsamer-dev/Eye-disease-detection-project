<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720" font-family="Arial, sans-serif">

  <!-- White background -->
  <rect width="960" height="720" fill="#ffffff"/>

  <!-- ═══════════════ TITLE ═══════════════ -->
  <text x="480" y="46" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">system Architecture</text>

  <!-- ═══════════════════════════════════════════════
       DOCTOR (left)
  ════════════════════════════════════════════════ -->
  <!-- Doctor icon: head -->
  <circle cx="72" cy="290" r="22" fill="none" stroke="#222" stroke-width="2"/>
  <!-- Doctor body -->
  <path d="M40 340 Q72 318 104 340 L108 390 L36 390 Z" fill="none" stroke="#222" stroke-width="2"/>
  <!-- Stethoscope hint -->
  <path d="M58 345 Q52 360 58 368 Q64 376 72 370" fill="none" stroke="#222" stroke-width="1.5"/>
  <!-- Arms -->
  <line x1="40" y1="355" x2="22" y2="375" stroke="#222" stroke-width="2"/>
  <line x1="104" y1="355" x2="122" y2="375" stroke="#222" stroke-width="2"/>
  <text x="72" y="408" text-anchor="middle" font-size="13" fill="#222" font-weight="600">Doctor</text>

  <!-- Arrow Doctor → Actions box -->
  <line x1="124" y1="335" x2="178" y2="335" stroke="#222" stroke-width="1.5"/>
  <polygon points="178,329 192,335 178,341" fill="#222"/>

  <!-- ═══════════════════════════════════════════════
       ACTIONS BOX  (login / upload / view image)
  ════════════════════════════════════════════════ -->
  <rect x="192" y="304" width="140" height="62" rx="4" fill="#c9a8b0" stroke="#999" stroke-width="1.2"/>
  <text x="262" y="326" text-anchor="middle" font-size="13" fill="#111">login</text>
  <text x="262" y="343" text-anchor="middle" font-size="13" fill="#111">upload</text>
  <text x="262" y="360" text-anchor="middle" font-size="13" fill="#111">view image</text>

  <!-- Arrow Actions → Frontend -->
  <line x1="332" y1="335" x2="388" y2="335" stroke="#222" stroke-width="1.5"/>
  <polygon points="388,329 402,335 388,341" fill="#222"/>

  <!-- ═══════════════════════════════════════════════
       GOOGLE AUTH (top-right)
  ════════════════════════════════════════════════ -->
  <rect x="692" y="96" width="216" height="68" rx="4" fill="#b060b8" stroke="#8030a0" stroke-width="1.2"/>
  <text x="800" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Google Authentication</text>
  <text x="800" y="140" text-anchor="middle" font-size="12" fill="#f0d0ff">(External Service)</text>
  <text x="800" y="157" text-anchor="middle" font-size="10.5" fill="#e8c8ff">accounts.google.com / OAuth 2.0</text>

  <!-- Arrow Frontend → Google Auth  (Authentication Request) -->
  <line x1="560" y1="260" x2="560" y2="148" stroke="#222" stroke-width="1.5"/>
  <line x1="560" y1="148" x2="690" y2="130" stroke="#222" stroke-width="1.5"/>
  <polygon points="690,124 706,130 690,136" fill="#222"/>
  <text x="614" y="140" font-size="11" fill="#333">Authentication Request</text>

  <!-- Arrow Google Auth → Frontend  (Authentication Response) -->
  <line x1="692" y1="152" x2="598" y2="222" stroke="#222" stroke-width="1.5"/>
  <polygon points="593,228 588,214 602,218" fill="#222"/>
  <text x="610" y="198" font-size="11" fill="#333">Authentication Response</text>

  <!-- ═══════════════════════════════════════════════
       FRONTEND BOX
  ════════════════════════════════════════════════ -->
  <rect x="402" y="236" width="196" height="100" rx="4" fill="#4a7a9b" stroke="#2c5f7a" stroke-width="1.5"/>
  <text x="500" y="267" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Web Application</text>
  <text x="500" y="286" text-anchor="middle" font-size="13" fill="#cde8f5">(front-end)</text>
  <text x="500" y="307" text-anchor="middle" font-size="11" fill="#a8d4ea">React 18 + Vite + MUI</text>
  <text x="500" y="325" text-anchor="middle" font-size="10.5" fill="#88c0d8">JWT · Google OAuth Callback</text>

  <!-- Label: send Request (Frontend → Backend) -->
  <text x="430" y="374" font-size="11" fill="#333">send Request</text>
  <!-- Arrow Frontend → Backend -->
  <line x1="490" y1="338" x2="490" y2="396" stroke="#222" stroke-width="1.5"/>
  <polygon points="484,396 490,410 496,396" fill="#222"/>

  <!-- Label: send Response (Backend → Frontend) -->
  <text x="510" y="390" font-size="11" fill="#333">send Response</text>
  <!-- Arrow Backend → Frontend -->
  <line x1="510" y1="410" x2="510" y2="342" stroke="#222" stroke-width="1.5"/>
  <polygon points="504,342 510,328 516,342" fill="#222"/>

  <!-- ═══════════════════════════════════════════════
       BACKEND BOX
  ════════════════════════════════════════════════ -->
  <rect x="402" y="412" width="196" height="110" rx="4" fill="#6aaa86" stroke="#3e8060" stroke-width="1.5"/>
  <text x="500" y="444" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Back-end Server</text>
  <text x="500" y="466" text-anchor="middle" font-size="11" fill="#d4f0e2">ASP.NET Core 7 (.NET)</text>
  <text x="500" y="484" text-anchor="middle" font-size="10.5" fill="#b8e4cc">Auth · Scans · Reports · Profile</text>
  <text x="500" y="502" text-anchor="middle" font-size="10.5" fill="#b8e4cc">Clean Architecture · EF Core</text>
  <text x="500" y="518" text-anchor="middle" font-size="10.5" fill="#c8ecd8">IIS — Port 8000 (outofprocess)</text>

  <!-- Arrow Backend → Database  (Save Data) -->
  <text x="512" y="562" font-size="11" fill="#333">Save Data</text>
  <line x1="500" y1="524" x2="500" y2="568" stroke="#222" stroke-width="1.5"/>
  <polygon points="494,568 500,582 506,568" fill="#222"/>

  <!-- ═══════════════════════════════════════════════
       DATABASE  (cylinder)
  ════════════════════════════════════════════════ -->
  <!-- Cylinder body -->
  <rect x="448" y="582" width="104" height="68" fill="#4e8a8a" stroke="#2e6060" stroke-width="1.5"/>
  <!-- Top ellipse -->
  <ellipse cx="500" cy="582" rx="52" ry="12" fill="#5aa0a0" stroke="#2e6060" stroke-width="1.5"/>
  <!-- Bottom ellipse -->
  <ellipse cx="500" cy="650" rx="52" ry="12" fill="#4e8a8a" stroke="#2e6060" stroke-width="1.5"/>
  <!-- Shine lines -->
  <line x1="448" y1="600" x2="552" y2="600" stroke="#6ab8b8" stroke-width="1" opacity="0.6"/>
  <line x1="448" y1="616" x2="552" y2="616" stroke="#6ab8b8" stroke-width="1" opacity="0.5"/>

  <text x="500" y="690" text-anchor="middle" font-size="13" fill="#222">System Database</text>
  <text x="500" y="706" text-anchor="middle" font-size="11" fill="#555">SQL Server — databaseasp.net</text>

  <!-- ═══════════════════════════════════════════════
       AI MODEL BOX  (right)
  ════════════════════════════════════════════════ -->
  <rect x="692" y="432" width="216" height="90" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="800" y="462" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">AI Model</text>
  <text x="800" y="481" text-anchor="middle" font-size="13" fill="#333">(eye Disease Detection)</text>
  <text x="800" y="500" text-anchor="middle" font-size="11" fill="#666">Python Flask · Port 5000</text>
  <text x="800" y="516" text-anchor="middle" font-size="11" fill="#888">External Server · 135.116.64.135</text>

  <!-- Arrow Backend → AI Model  (send image) -->
  <line x1="598" y1="488" x2="690" y2="488" stroke="#222" stroke-width="1.5"/>
  <polygon points="690,482 706,488 690,494" fill="#222"/>
  <text x="628" y="503" font-size="11" fill="#333">send image</text>

  <!-- Arrow AI Model → Backend  (send Result) -->
  <line x1="692" y1="468" x2="598" y2="453" stroke="#222" stroke-width="1.5"/>
  <polygon points="593,459 588,444 602,449" fill="#222"/>
  <text x="622" y="454" font-size="11" fill="#333">send Result</text>

  <!-- ═══════════════════════════════════════════════
       HOSTING LABEL (bottom)
  ════════════════════════════════════════════════ -->
  <rect x="20" y="726" width="920" height="1" fill="none"/>
  <!-- Dashed hosting boundary around Frontend + Backend -->
  <rect x="388" y="224" width="224" height="312" rx="8" fill="none" stroke="#2c5f7a" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="612" y="238" font-size="10" fill="#2c5f7a" opacity="0.7">smarterasp.net (IIS)</text>

</svg>
